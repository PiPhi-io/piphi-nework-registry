name: Validate Submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  validate-submission:
    if: contains(join(github.event.issue.labels.*.name, ','), 'submission')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run submission validator
        id: validate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY_PATH: registry.json
        run: python scripts/validate_submission.py
        continue-on-error: true

      - name: Upsert validation comment
        uses: actions/github-script@v7
        env:
          VALIDATION_COMMENT: ${{ steps.validate.outputs.validation_comment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = "<!-- piphi-submission-validation -->";
            const body = `${marker}\n${process.env.VALIDATION_COMMENT || "Validation did not produce output."}`;
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Update validation labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = "${{ steps.validate.outputs.validation_status }}";
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };
            await removeIfPresent("validation-passed");
            await removeIfPresent("needs-changes");
            await removeIfPresent("ready-for-review");
            if (status === "passed") {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ["validation-passed", "ready-for-review"],
              });
            } else {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ["needs-changes"],
              });
            }

      - name: Fail workflow when validation fails
        if: steps.validate.outputs.validation_status != 'passed'
        run: exit 1
